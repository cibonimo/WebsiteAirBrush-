<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Log In — AirBrush</title>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css"/>
<!-- MediaPipe -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
<style>
* { font-family: 'Caveat', cursive !important; }
.gesture-webcam-box {
  position:relative;width:100%;aspect-ratio:4/3;
  background:#0a0a0f;border-radius:12px;overflow:hidden;
  border:1px solid rgba(255,255,255,0.08);
}
.gesture-webcam-box video  { width:100%;height:100%;object-fit:cover; transform:scaleX(-1); }
.gesture-webcam-box canvas { position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none; transform:scaleX(-1); }
.pin-display { text-align:center;font-size:2.5rem;letter-spacing:0.8rem;margin:1rem 0;color:var(--accent2); }
.status-msg  { text-align:center;font-size:1rem;color:#06B6D4;margin:0.5rem 0;min-height:1.4em; }
.gesture-instruction { font-size:1rem;color:var(--text-muted);text-align:center;margin:0.5rem 0; }
</style>
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <h2>Welcome back</h2>
    <p>Log in to your Airbrush account.</p>

    <div class="auth-method-tabs">
      <button class="auth-method-btn active" data-method="email">📧 Email</button>
      <button class="auth-method-btn" data-method="pin">🔢 Air PIN</button>
    </div>

    <!-- ===== EMAIL LOGIN ===== -->
    <div id="method-email">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="li-email" placeholder="you@example.com"/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="li-password" placeholder="Your password"/>
      </div>
      <button class="btn-submit" id="email-login-btn">Log In</button>
    </div>

    <!-- ===== AIR PIN LOGIN ===== -->
    <div id="method-pin" style="display:none;">
      <p class="gesture-instruction">
        Hold up fingers for each digit (1–5 = one hand, 6–10 = sum both hands).<br/>
        Hold still for 2 seconds to confirm. Repeat for all 4 digits.
      </p>
      <div class="gesture-webcam-box" id="pin-webcam-box">
        <video id="pin-video" autoplay muted playsinline></video>
        <canvas id="pin-canvas"></canvas>
      </div>
      <div class="pin-display" id="pin-display">_ _ _ _</div>
      <div class="status-msg" id="pin-status">Click "Start Camera" to begin.</div>
      <button class="btn-submit" id="pin-login-btn">Start Camera &amp; Enter PIN</button>
      <button class="btn-submit" id="pin-verify-btn"
        style="display:none;margin-top:0.75rem;background:linear-gradient(135deg,#7C3AED,#06B6D4);">
        Verify PIN &amp; Log In →
      </button>
    </div>

    <p style="text-align:center;color:var(--text-muted);font-size:1rem;margin-top:1.5rem;">
      New here? <a href="signup.html" style="color:var(--accent2);">Create Account</a>
    </p>
  </div>
</div>

<script>
'use strict';

/* ── Tab Switcher ── */
document.querySelectorAll('.auth-method-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.auth-method-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const m = btn.dataset.method;
    ['email','pin'].forEach(k => {
      const el = document.getElementById(`method-${k}`);
      if (el) el.style.display = k === m ? '' : 'none';
    });
  });
});

/* ── Utilities ── */
function getUsers() {
  try { return JSON.parse(localStorage.getItem('ab_users') || '[]'); } catch { return []; }
}
function findUser(email) { return getUsers().find(u => u.email === email.toLowerCase()); }

function toast(msg, type='info') {
  let el = document.getElementById('ab-toast');
  if (!el) {
    el = document.createElement('div'); el.id = 'ab-toast';
    Object.assign(el.style, {
      position:'fixed',bottom:'24px',left:'50%',transform:'translateX(-50%)',
      padding:'10px 22px',borderRadius:'10px',fontSize:'1rem',color:'#fff',
      zIndex:'9999',pointerEvents:'none',fontFamily:"'Caveat',cursive",
      transition:'opacity 0.3s',opacity:'0'
    });
    document.body.appendChild(el);
  }
  const colors = { info:'#7C3AED', success:'#16a34a', error:'#dc2626' };
  el.style.background = colors[type] || colors.info;
  el.textContent = msg;
  el.style.opacity = '1';
  clearTimeout(el._t);
  el._t = setTimeout(() => { el.style.opacity = '0'; }, 3000);
}

function setStatus(id, msg) {
  const el = document.getElementById(id); if (el) el.textContent = msg;
}

/* ══ EMAIL LOGIN ══ */
document.getElementById('email-login-btn').addEventListener('click', () => {
  const email = document.getElementById('li-email').value.trim().toLowerCase();
  const pass  = document.getElementById('li-password').value;
  const user  = findUser(email);
  if (!user)               { toast('No account found with this email', 'error'); return; }
  if (user.password !== pass){ toast('Incorrect password', 'error'); return; }
  localStorage.setItem('ab_current', JSON.stringify({ email, name: user.name }));
  toast(`Welcome back, ${user.name}!`, 'success');
  setTimeout(() => window.location.href = 'canvas.html', 1000);
});

/* ══ AIR PIN LOGIN ══ */
const PIN_STABLE_MS   = 2000;
const PIN_MOVE_THRESH = 0.04;

let pinStream    = null;
let pinHands     = null;
let pinDigits    = [];
let pinCurrent   = -1;
let pinStableStart = null;
let pinLastPos   = null;
let pinActive    = false;

const pinVideo  = document.getElementById('pin-video');
const pinCanvas = document.getElementById('pin-canvas');
const pinCtx    = pinCanvas ? pinCanvas.getContext('2d') : null;

function countAllFingers(allLandmarks) {
  let total = 0;
  for (const lm of allLandmarks) {
    if (lm[4].x < lm[3].x) total++;
    const tips=[8,12,16,20], pips=[6,10,14,18];
    for (let i=0;i<4;i++) if (lm[tips[i]].y < lm[pips[i]].y) total++;
  }
  return total;
}

function updatePinDisplay() {
  const el = document.getElementById('pin-display'); if (!el) return;
  const chars = ['_','_','_','_'];
  pinDigits.forEach((d,i) => { chars[i] = `<span style="color:#22c55e">${d}</span>`; });
  el.innerHTML = chars.join(' ');
}

document.getElementById('pin-login-btn')?.addEventListener('click', async () => {
  setStatus('pin-status', 'Starting camera…');
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ video:{ width:640, height:480 } });
    pinVideo.srcObject = stream; pinStream = stream;
    await new Promise(r => pinVideo.addEventListener('loadedmetadata', r, { once:true }));
    pinCanvas.width  = pinVideo.videoWidth;
    pinCanvas.height = pinVideo.videoHeight;
  } catch(e) { toast('Camera access denied', 'error'); return; }

  pinDigits=[]; pinActive=true; pinCurrent=-1; pinStableStart=null; pinLastPos=null;
  updatePinDisplay();

  if (!pinHands) {
    pinHands = new Hands({ locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}` });
    pinHands.setOptions({ maxNumHands:2, modelComplexity:1, minDetectionConfidence:0.7, minTrackingConfidence:0.7 });
    pinHands.onResults(onPinResults);
  }
  const camera = new Camera(pinVideo, {
    onFrame: async () => { if (pinActive) await pinHands.send({ image: pinVideo }); },
    width:640, height:480
  });
  camera.start();
  document.getElementById('pin-login-btn').style.display = 'none';
  setStatus('pin-status', `Digit 1: Hold up 1–10 fingers still for 2 seconds.`);
});

function onPinResults(results) {
  if (!pinCtx || !pinActive) return;
  pinCtx.clearRect(0, 0, pinCanvas.width, pinCanvas.height);
  if (pinDigits.length >= 4) return;

  if (!results.multiHandLandmarks?.length) {
    pinLastPos=null; pinStableStart=null;
    setStatus('pin-status', `Digit ${pinDigits.length+1}: Show your hand to the camera.`);
    return;
  }

  for (const lm of results.multiHandLandmarks) {
    drawConnectors(pinCtx, lm, HAND_CONNECTIONS, { color:'rgba(124,58,237,0.8)', lineWidth:2 });
    drawLandmarks(pinCtx, lm, { color:'#06B6D4', lineWidth:1, radius:3 });
  }

  const count = countAllFingers(results.multiHandLandmarks);
  const wrist = results.multiHandLandmarks[0][0];
  const isMoving = pinLastPos
    ? (Math.abs(wrist.x - pinLastPos.x) > PIN_MOVE_THRESH ||
       Math.abs(wrist.y - pinLastPos.y) > PIN_MOVE_THRESH)
    : false;
  pinLastPos = { x: wrist.x, y: wrist.y };

  if (isMoving) { pinStableStart=null; pinCurrent=-1; setStatus('pin-status', `Digit ${pinDigits.length+1}: Keep still…`); return; }

  if (count !== pinCurrent) {
    pinCurrent = count; pinStableStart = Date.now();
    setStatus('pin-status', `Digit ${pinDigits.length+1}: Showing ${count} — hold still…`);
  } else if (pinStableStart && (Date.now() - pinStableStart) >= PIN_STABLE_MS) {
    pinDigits.push(count);
    pinStableStart=null; pinCurrent=-1; pinLastPos=null;
    updatePinDisplay();
    if (pinDigits.length >= 4) {
      setStatus('pin-status', '✅ PIN entered! Click Verify to log in.');
      document.getElementById('pin-verify-btn').style.display = '';
      pinActive = false;
    } else {
      setStatus('pin-status', `✅ Digit ${pinDigits.length} done. Now digit ${pinDigits.length+1}.`);
    }
  } else {
    const elapsed = pinStableStart ? (Date.now() - pinStableStart) : 0;
    const remain  = ((PIN_STABLE_MS - elapsed)/1000).toFixed(1);
    setStatus('pin-status', `Digit ${pinDigits.length+1}: ${count} finger${count!==1?'s':''} — ${remain}s to confirm`);
  }

  if (results.multiHandLandmarks[0]) {
    const lm   = results.multiHandLandmarks[0];
    const tipX = lm[8].x * pinCanvas.width;
    const tipY = lm[8].y * pinCanvas.height - 24;
    pinCtx.fillStyle='#fff'; pinCtx.font='bold 20px Caveat, cursive';
    pinCtx.fillText(`${count}`, tipX, tipY);
  }
}

document.getElementById('pin-verify-btn')?.addEventListener('click', () => {
  if (pinStream) pinStream.getTracks().forEach(t => t.stop());
  const users = getUsers();
  const pinUsers = users.filter(u => u.type === 'pin' && Array.isArray(u.pin));
  const matched = pinUsers.find(u =>
    u.pin.length === 4 && u.pin.every((d,i) => d === pinDigits[i])
  );
  if (!matched) {
    toast('PIN does not match any account', 'error');
    setStatus('pin-status', '❌ Incorrect PIN. Try again.');
    return;
  }
  localStorage.setItem('ab_current', JSON.stringify({ email: matched.email, name: matched.name }));
  toast(`Welcome back, ${matched.name}!`, 'success');
  setTimeout(() => window.location.href = 'canvas.html', 1000);
});

catch { return []; }
}
</script>
</body>
</html>
